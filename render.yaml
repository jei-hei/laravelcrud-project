# render.yaml file for deploying Laravel application on Render
services:
  - type: web
    name: laravelcrud-project
    env: php
    buildCommand: |
      # Install PHP and necessary PHP extensions
      apt-get update && apt-get install -y php-cli php-fpm php-mbstring php-xml php-json php-curl php-mysql
      # Install Composer
      curl -sS https://getcomposer.org/installer | php
      mv composer.phar /usr/local/bin/composer
      # Install npm dependencies and build frontend assets
      npm install
      npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=8000
